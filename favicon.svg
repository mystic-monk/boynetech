<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy background -->
  <rect width="32" height="32" rx="7" fill="#0C1F3F"/>
  <!-- White left half of hexagon -->
  <polygon points="16,5 6.5,10.5 6.5,21.5 16,27" fill="rgba(255,255,255,0.92)"/>
  <!-- Emerald right half of hexagon -->
  <polygon points="16,5 25.5,10.5 25.5,21.5 16,27" fill="#0D7A56"/>
  <!-- Subtle hexagon outline to tie both halves -->
  <polygon points="16,5 25.5,10.5 25.5,21.5 16,27 6.5,21.5 6.5,10.5" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
</svg>
