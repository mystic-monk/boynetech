<!DOCTYPE html>
<html lang="en-IE">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Boyne Tech Client Portal: secure access for Boyne Tech clients.">
  <meta name="robots" content="noindex, nofollow">
  <title>Client Portal | Boyne Tech</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../images/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../images/apple-touch-icon.png">
  <link rel="manifest" href="../site.webmanifest">
  <meta name="theme-color" content="#0E2438">
  <style>
    /* Minimal portal layout */
    body {
      background-color: var(--bt-cloud);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Stripped nav — logo only */
    .portal-nav {
      background-color: var(--bt-white);
      border-bottom: 1px solid rgba(140,153,148,.15);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Login panel */
    .portal-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--bt-space-xl) 1.5rem;
    }

    .portal-panel {
      background: var(--bt-white);
      border-radius: var(--bt-radius-lg);
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--bt-shadow-md);
      border: 1px solid rgba(140,153,148,.15);
      text-align: center;
    }

    .portal-logo {
      font-family: var(--bt-font-display);
      font-size: 1.375rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--bt-navy);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 0.25rem;
    }
    .portal-logo span { color: var(--bt-emerald); }

    .portal-heading {
      font-family: var(--bt-font-display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--bt-navy);
      margin-top: 1.5rem;
      margin-bottom: 0.375rem;
    }
    .portal-sub {
      font-size: 0.9rem;
      color: var(--bt-slate);
      line-height: 1.55;
      margin-bottom: 1.75rem;
    }

    .portal-form .form-group {
      text-align: left;
      margin-bottom: 1rem;
    }
    .portal-form label {
      font-size: 0.875rem;
    }

    .portal-divider {
      border: none;
      border-top: 1px solid var(--bt-cloud);
      margin: 1.5rem 0;
    }

    .portal-note {
      font-size: 0.8125rem;
      color: var(--bt-slate);
      line-height: 1.6;
      margin-bottom: 1.25rem;
    }

    .portal-back {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--bt-blue);
    }

    /* Minimal footer */
    .portal-footer {
      background: var(--bt-navy);
      padding: 1.125rem 1.5rem;
      text-align: center;
      font-size: 0.8125rem;
      color: rgba(255,255,255,.45);
    }
  </style>
</head>
<body>

  <!-- Minimal nav — logo only -->
  <div class="portal-nav" role="banner">
    <a href="../index.html" class="portal-logo" aria-label="Boyne Tech home">
      Boyne <span>Tech</span>
    </a>
  </div>

  <!-- Login panel -->
  <div class="portal-wrap">
    <div class="portal-panel">
      <p class="portal-heading">Client Portal</p>
      <p class="portal-sub">Secure access to your project dashboards, documents, and updates.</p>

      <form class="portal-form" action="#" method="post" novalidate aria-label="Portal sign-in form">
        <div class="form-group">
          <label for="portalEmail">Email address</label>
          <input type="email" id="portalEmail" name="email" placeholder="you@yourorganisation.ie" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="portalPassword">Password</label>
          <input type="password" id="portalPassword" name="password" placeholder="Your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:0.5rem;">Sign In</button>
      </form>

      <hr class="portal-divider">

      <p class="portal-note">
        Access is by invitation only. If you're a Boyne Tech client and don't yet have credentials, please contact your project lead or email
        <a href="mailto:hello@boynetech.ie">hello@boynetech.ie</a>.
      </p>

      <a href="../index.html" class="portal-back">&#x2190; Visit our website</a>
    </div>
  </div>

  <footer class="portal-footer" role="contentinfo">
    &copy; 2025 Boyne Tech Limited
  </footer>

</body>
</html>
